name: CI/CD Pipeline

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

jobs:
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            web: ${{ steps.filter.outputs.web }}
            sinkru: ${{ steps.filter.outputs.sinkru }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Filter paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      web:
                        - 'web/**'
                        - '.github/workflows/deploy.yml'
                      sinkru:
                        - 'sinkru/**'
                        - '.github/workflows/deploy.yml'

    build_site:
        needs: detect-changes
        if: needs.detect-changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: npm install
              working-directory: web

            - name: build
              env:
                  BASE_PATH: "/test${{ github.event.repository.name }}"
                  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
                  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
                  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
                  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
                  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
                  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
                  VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
              run: |
                  echo $BASE_PATH && npm run build
              working-directory: web

            - name: Upload Artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "web/build/"

    deploy_site:
        needs: [detect-changes, build_site]
        if: github.event_name == 'push' && needs.detect-changes.outputs.web == 'true'
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4

    build-and-push-docker:
        needs: detect-changes
        if: needs.detect-changes.outputs.sinkru == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  username: karim3219
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: karim3219/sinkru
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,format=short
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./sinkru
                  file: ./sinkru/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  annotations: ${{ steps.meta.outputs.annotations }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate Job Summary
              if: github.event_name != 'pull_request'
              run: |
                  echo "### Image Pushed" >> $GITHUB_STEP_SUMMARY
                  echo "Tag:" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
